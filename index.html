<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belagraph | Bold Art Works</title>
    <meta name="description" content="Bold poster designs and custom Ethiopian typefaces by Abel Daniel. Specializing in typography, logo design, and brand identity.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
</head>
<body>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu">
        <div class="mobile-menu__header">
            <span class="mobile-menu__logo"><img src="Belagraph logo.svg" alt="Belagraph" style="height:36px;filter:invert(0);"></span>
            <button id="close-menu" class="mobile-menu__close">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <nav id="mobile-nav" class="mobile-menu__nav"></nav>
    </div>

    <!-- Navigation -->
    <nav id="navbar" class="navbar">
        <div class="container">
            <a href="#" class="navbar__logo">
                <img src="Belagraph logo.svg" alt="Belagraph" class="navbar__logo-img">
            </a>
            <div id="desktop-nav" class="navbar__center"></div>
            <div class="navbar__right">
                <div id="social-links" class="social-links-desktop"></div>
                <button id="open-menu" class="menu-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <!-- Hero -->
        <section id="hero" class="hero">
            <div id="hero-slides" class="hero__slides"></div>
            <div class="hero__overlay"></div>
            <div class="hero__content container">
                <div class="hero__badge" data-content="hero.badge"></div>
                <h1 id="hero-title" class="hero__title"></h1>
                <div class="hero__cta">
                    <a id="hero-cta" href="#posters" class="btn-white"></a>
                </div>
            </div>
            <div id="hero-dots" class="hero__dots"></div>
        </section>

        <!-- Posters -->
        <section id="posters" class="gallery-section">
            <div class="container">
                <div class="gallery__header reveal">
                    <div class="gallery__header-text">
                        <h2 class="heading-lg gallery__title">
                            <span data-content="posters.title"></span><span class="accent" style="color:var(--color-accent)">.</span>
                        </h2>
                        <p class="body-text" data-content="posters.description"></p>
                    </div>
                    <div id="category-filters" class="gallery__filters"></div>
                </div>
                <div class="gallery__viewport reveal">
                    <button id="poster-scroll-left" class="gallery__scroll-btn gallery__scroll-btn--left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button id="poster-scroll-right" class="gallery__scroll-btn gallery__scroll-btn--right">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div id="poster-gallery" class="gallery__track"></div>
                </div>
            </div>
        </section>

        <!-- About -->
        <section id="about" class="about">
            <div class="container">
                <div class="about__image-wrap reveal">
                    <img id="about-img" src="" alt="Abel Daniel">
                </div>
                <div class="about__content reveal">
                    <p class="heading-sm about__badge" data-content="about.badge"></p>
                    <h2 class="heading-lg about__name" data-content="about.name"></h2>
                    <p class="body-text about__bio" data-content="about.description_1"></p>
                    <p class="body-text about__bio" data-content="about.description_2"></p>
                    <div class="about__cta">
                        <a href="Abel-Daniel-Portfolio-2016.pdf" class="btn-primary" download>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            <span data-content="about.cta_text"></span>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Fonts -->
        <section id="fonts" class="gallery-section gallery-section--dark">
            <div class="container">
                <div class="gallery__header reveal">
                    <div class="gallery__header-text">
                        <h2 class="heading-lg gallery__title">
                            <span data-content="fonts.title"></span><span class="accent" style="color:var(--color-accent)">.</span>
                        </h2>
                        <p class="body-text" data-content="fonts.description"></p>
                    </div>
                </div>
                <div class="gallery__viewport reveal">
                    <button id="font-scroll-left" class="gallery__scroll-btn gallery__scroll-btn--left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button id="font-scroll-right" class="gallery__scroll-btn gallery__scroll-btn--right">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div id="font-gallery" class="gallery__track"></div>
                </div>
            </div>
        </section>



        <!-- Contact -->
        <section id="contact" class="contact">
            <div class="container">
                <div class="reveal">
                    <h2 class="heading-lg contact__title" data-content="contact.title"></h2>
                    <div>
                        <div class="contact__info-item">
                            <p class="heading-sm contact__info-label" data-content="contact.email_label"></p>
                            <p class="contact__info-value" data-content="contact.email_value"></p>
                        </div>
                        <div class="contact__info-item">
                            <p class="heading-sm contact__info-label" data-content="contact.location_label"></p>
                            <p class="contact__info-value" data-content="contact.location_value"></p>
                        </div>
                    </div>
                </div>
                <div class="reveal">
                    <form id="contact-form" class="contact__form">
                        <div class="contact__form-group">
                            <label class="label contact__form-label" data-content="contact.form.name_label"></label>
                            <input type="text" id="form-name" class="contact__form-input" required>
                        </div>
                        <div class="contact__form-group">
                            <label class="label contact__form-label" data-content="contact.form.email_label"></label>
                            <input type="text" id="form-email" class="contact__form-input" required>
                        </div>
                        <div class="contact__form-group">
                            <label class="label contact__form-label" data-content="contact.form.message_label"></label>
                            <textarea id="form-message" class="contact__form-textarea" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="contact__form-submit" data-content="contact.form.submit_btn"></button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__top">
                <div>
                    <div class="footer__logo">
                        <img src="Belagraph logo.svg" alt="Belagraph" class="footer__logo-img">
                    </div>
                    <p class="footer__tagline" data-content="footer.tagline"></p>
                </div>
                <div id="footer-socials" class="footer__socials"></div>
            </div>
            <div class="footer__bottom">
                <p class="footer__copyright" data-content="footer.copyright"></p>
                <p class="footer__credit">
                    <a href="https://t.me/graceindesign" target="_blank">Developer Contact</a>
                </p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
